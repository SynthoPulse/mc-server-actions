name: Minecraft Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore world from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            world
            world_nether
            world_the_end
            banned-players.json
            banned-ips.json
            ops.json
            whitelist.json
          key: mc-world-save
          restore-keys: |
            mc-world-

      - name: Download and install Forge
        run: |
          echo "Downloading Forge 1.19.2-43.3.5..."
          wget -q https://maven.minecraftforge.net/net/minecraftforge/forge/1.19.2-43.3.5/forge-1.19.2-43.3.5-installer.jar
          echo "Installing Forge server..."
          java -jar forge-1.19.2-43.3.5-installer.jar --installServer
          rm forge-1.19.2-43.3.5-installer.jar
          rm forge-1.19.2-43.3.5-installer.jar.log 2>/dev/null || true
          echo "eula=true" > eula.txt
          echo "Forge installed!"

      - name: Configure server
        run: |
          cat > server.properties << 'PROPS'
          server-port=25565
          gamemode=survival
          difficulty=normal
          max-players=5
          view-distance=6
          simulation-distance=4
          allow-flight=true
          pvp=false
          motd=SynthoPulse Server
          online-mode=false
          spawn-protection=0
          enable-command-block=true
          PROPS

      - name: Setup ops.json
        run: |
          cat > ops.json << 'OPS'
          [
            {
              "uuid": "00000000-0000-0000-0000-000000000001",
              "name": "MustafaX",
              "level": 4,
              "bypassesPlayerLimit": true
            },
            {
              "uuid": "00000000-0000-0000-0000-000000000002",
              "name": "muhammad12000",
              "level": 4,
              "bypassesPlayerLimit": true
            },
            {
              "uuid": "00000000-0000-0000-0000-000000000003",
              "name": "AbbasMaster",
              "level": 4,
              "bypassesPlayerLimit": true
            }
          ]
          OPS
          echo "ops.json created!"

      - name: Setup SSH tunnel with serveo
        run: |
          echo "Setting up SSH tunnel..."
          sudo apt-get install -y autossh 2>/dev/null || true
          
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N "" -q
          
          ssh -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=3 \
              -R 25565:localhost:25565 \
              serveo.net > serveo_output.log 2>&1 &
          
          SSH_PID=$!
          echo "SSH tunnel PID: $SSH_PID"
          
          sleep 15
          
          echo "========================================="
          echo "  TUNNEL OUTPUT:"
          cat serveo_output.log 2>/dev/null || echo "No output yet"
          echo "========================================="
          
          SERVER_ADDR=$(grep -o "Forwarding TCP.*" serveo_output.log 2>/dev/null | head -1)
          echo "Server address info: $SERVER_ADDR"

      - name: Start Minecraft Server
        run: |
          echo "========================================="
          echo "  Starting Minecraft Server..."
          echo "  Forge 1.19.2-43.3.5 | RAM: 4GB"
          echo "========================================="

          java -Xmx4G -Xms4G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dlog4j2.formatMsgNoLookups=true \
            @libraries/net/minecraftforge/forge/1.19.2-43.3.5/unix_args.txt nogui &

          MC_PID=$!
          echo "Waiting for server to start..."

          TIMEOUT=600
          ELAPSED=0
          while ! grep -q "Done" logs/latest.log 2>/dev/null; do
            sleep 10
            ELAPSED=$((ELAPSED + 10))
            echo "Loading mods... ($ELAPSED seconds)"
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Server took too long!"
              cat logs/latest.log 2>/dev/null | tail -50
              exit 1
            fi
          done

          echo "========================================="
          echo "  SERVER IS RUNNING!"
          echo "========================================="
          
          echo "Tunnel address:"
          cat serveo_output.log 2>/dev/null || true

          while kill -0 $MC_PID 2>/dev/null; do
            sleep 300
            echo "Auto-saving world..."
            echo "Current tunnel info:"
            cat serveo_output.log 2>/dev/null | tail -5 || true
          done

      - name: Save world
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            world
            world_nether
            world_the_end
            banned-players.json
            banned-ips.json
            ops.json
            whitelist.json
          key: mc-world-save-${{ github.run_number }}
