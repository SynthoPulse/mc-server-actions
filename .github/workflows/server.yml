name: Minecraft Server

on:
  workflow_dispatch:

concurrency:
  group: minecraft-server
  cancel-in-progress: true

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore world from latest save
        uses: actions/cache/restore@v4
        with:
          path: |
            world
            world_nether
            world_the_end
            banned-players.json
            banned-ips.json
            ops.json
            whitelist.json
          key: mc-world-save-latest
          restore-keys: |
            mc-world-save-

      - name: Check restored world
        run: |
          if [ -d "world" ]; then
            echo "✅ World restored successfully!"
            echo "World size: $(du -sh world/ | cut -f1)"
          else
            echo "⚠️ No world found. Starting fresh."
          fi

      - name: Download and install Forge
        run: |
          wget -q https://maven.minecraftforge.net/net/minecraftforge/forge/1.19.2-43.3.5/forge-1.19.2-43.3.5-installer.jar
          java -jar forge-1.19.2-43.3.5-installer.jar --installServer
          rm forge-1.19.2-43.3.5-installer.jar
          rm forge-1.19.2-43.3.5-installer.jar.log 2>/dev/null || true
          echo "eula=true" > eula.txt

      - name: Configure server
        run: |
          cat > server.properties << 'PROPS'
          server-port=25565
          gamemode=survival
          difficulty=normal
          max-players=5
          view-distance=6
          simulation-distance=4
          allow-flight=true
          pvp=false
          motd=SynthoPulse Server
          online-mode=false
          spawn-protection=0
          enable-command-block=true
          op-permission-level=4
          function-permission-level=4
          PROPS

      - name: Install and connect Playit
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          curl -L -o playit https://github.com/playit-cloud/playit-agent/releases/download/v0.15.26/playit-linux-amd64
          chmod +x playit
          cat > playit.toml << EOF
          secret_key = "$PLAYIT_SECRET"
          EOF
          PLAYIT_SECRET_KEY="$PLAYIT_SECRET" ./playit > playit.log 2>&1 &
          sleep 30
          echo "Playit Status:"
          cat playit.log | tail -5

      - name: Start server with auto-shutdown
        run: |
          echo "Starting Minecraft Server..."
          
          java -Xmx4G -Xms4G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dlog4j2.formatMsgNoLookups=true \
            @libraries/net/minecraftforge/forge/1.19.2-43.3.5/unix_args.txt nogui &
          
          MC_PID=$!
          
          TIMEOUT=600
          ELAPSED=0
          while ! grep -q "Done" logs/latest.log 2>/dev/null; do
            sleep 10
            ELAPSED=$((ELAPSED + 10))
            echo "Loading mods... ($ELAPSED seconds)"
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Server took too long!"
              kill $MC_PID 2>/dev/null
              exit 1
            fi
          done
          
          echo "========================================="
          echo "  SERVER IS RUNNING!"
          echo "  Address: economic-acts.gl.joinmc.link"
          echo "========================================="
          
          sleep 5
          echo "op MustafaX" >> /proc/$MC_PID/fd/0 2>/dev/null || true
          sleep 2
          echo "op muhammad12000" >> /proc/$MC_PID/fd/0 2>/dev/null || true
          sleep 2
          echo "op AbbasMaster" >> /proc/$MC_PID/fd/0 2>/dev/null || true
          
          echo "Monitoring players. Server will stop after 10 min with 0 players."
          
          EMPTY_TIME=0
          MAX_RUNTIME=20700
          TOTAL_TIME=0
          SAVE_TIMER=0
          
          while kill -0 $MC_PID 2>/dev/null; do
            sleep 30
            TOTAL_TIME=$((TOTAL_TIME + 30))
            SAVE_TIMER=$((SAVE_TIMER + 30))
            
            PLAYER_COUNT=$(grep -c "joined the game" logs/latest.log 2>/dev/null || echo "0")
            LEFT_COUNT=$(grep -c "left the game" logs/latest.log 2>/dev/null || echo "0")
            ONLINE=$((PLAYER_COUNT - LEFT_COUNT))
            
            if [ "$ONLINE" -le 0 ]; then
              EMPTY_TIME=$((EMPTY_TIME + 30))
            else
              EMPTY_TIME=0
            fi
            
            if [ $SAVE_TIMER -ge 300 ]; then
              SAVE_TIMER=0
              HOURS=$((TOTAL_TIME / 3600))
              MINUTES=$(((TOTAL_TIME % 3600) / 60))
              echo "Auto-saving... (${HOURS}h ${MINUTES}m) Players online: $ONLINE"
              echo "save-all" >> /proc/$MC_PID/fd/0 2>/dev/null || true
            fi
            
            if [ $EMPTY_TIME -ge 600 ]; then
              echo "========================================="
              echo "  No players for 10 minutes!"
              echo "  Saving and stopping server..."
              echo "========================================="
              echo "save-all" >> /proc/$MC_PID/fd/0 2>/dev/null || true
              sleep 15
              echo "stop" >> /proc/$MC_PID/fd/0 2>/dev/null || true
              sleep 30
              kill $MC_PID 2>/dev/null || true
              break
            fi
            
            if [ $TOTAL_TIME -ge $MAX_RUNTIME ]; then
              echo "========================================="
              echo "  5h 45m reached!"
              echo "  Saving and stopping server..."
              echo "========================================="
              echo "save-all" >> /proc/$MC_PID/fd/0 2>/dev/null || true
              sleep 15
              echo "stop" >> /proc/$MC_PID/fd/0 2>/dev/null || true
              sleep 30
              kill $MC_PID 2>/dev/null || true
              break
            fi
          done
          
          echo "Server stopped safely."

      - name: Delete old cache
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deleting old caches..."
          gh cache list --json id,key | jq -r '.[] | select(.key | startswith("mc-world-save-")) | .id' | while read id; do
            gh cache delete "$id" 2>/dev/null || true
          done
          echo "Old caches deleted!"

      - name: Save world to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            world
            world_nether
            world_the_end
            banned-players.json
            banned-ips.json
            ops.json
            whitelist.json
          key: mc-world-save-latest
