name: Minecraft Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: minecraft-server
  cancel-in-progress: false

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install screen and git
        run: |
          sudo apt-get install -y screen git
          git config --global user.email "server@minecraft.com"
          git config --global user.name "Minecraft Server"

      - name: Download world save from repository
        run: |
          echo "Checking for saved world..."
          if [ -d "world_save/world" ]; then
            echo "Found saved world! Restoring..."
            cp -r world_save/world . 2>/dev/null || true
            cp -r world_save/world_nether . 2>/dev/null || true
            cp -r world_save/world_the_end . 2>/dev/null || true
            cp world_save/ops.json . 2>/dev/null || true
            cp world_save/banned-players.json . 2>/dev/null || true
            cp world_save/banned-ips.json . 2>/dev/null || true
            cp world_save/whitelist.json . 2>/dev/null || true
            echo "World restored successfully!"
          else
            echo "No saved world found. Starting fresh world."
          fi

      - name: Download and install Forge
        run: |
          echo "Downloading Forge 1.19.2-43.3.5..."
          wget -q https://maven.minecraftforge.net/net/minecraftforge/forge/1.19.2-43.3.5/forge-1.19.2-43.3.5-installer.jar
          echo "Installing Forge server..."
          java -jar forge-1.19.2-43.3.5-installer.jar --installServer
          rm forge-1.19.2-43.3.5-installer.jar
          rm forge-1.19.2-43.3.5-installer.jar.log 2>/dev/null || true
          echo "eula=true" > eula.txt
          echo "Forge installed!"

      - name: Configure server
        run: |
          cat > server.properties << 'PROPS'
          server-port=25565
          gamemode=survival
          difficulty=hard
          max-players=5
          view-distance=5
          simulation-distance=5
          allow-flight=true
          pvp=false
          motd=SynthoPulse Server
          online-mode=false
          spawn-protection=0
          enable-command-block=true
          op-permission-level=4
          function-permission-level=4
          PROPS

      - name: Install and connect Playit automatically
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          echo "Downloading Playit..."
          curl -L -o playit https://github.com/playit-cloud/playit-agent/releases/download/v0.15.26/playit-linux-amd64
          chmod +x playit
          
          cat > playit.toml << EOF
          secret_key = "$PLAYIT_SECRET"
          EOF
          
          echo "Starting Playit..."
          PLAYIT_SECRET_KEY="$PLAYIT_SECRET" ./playit > playit.log 2>&1 &
          
          sleep 30
          
          echo "========================================="
          echo "  Playit Status:"
          cat playit.log | tail -5
          echo "========================================="

      - name: Start Minecraft Server
        run: |
          echo "========================================="
          echo "  Starting Minecraft Server..."
          echo "========================================="

          screen -dmS mc java -Xmx4G -Xms4G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dlog4j2.formatMsgNoLookups=true \
            @libraries/net/minecraftforge/forge/1.19.2-43.3.5/unix_args.txt nogui

          echo "Waiting for server to start..."

          TIMEOUT=600
          ELAPSED=0
          while ! grep -q "Done" logs/latest.log 2>/dev/null; do
            sleep 10
            ELAPSED=$((ELAPSED + 10))
            echo "Loading mods... ($ELAPSED seconds)"
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Server took too long!"
              cat logs/latest.log 2>/dev/null | tail -50
              exit 1
            fi
          done

          echo "========================================="
          echo "  SERVER IS RUNNING!"
          echo "  Setting admins..."
          echo "========================================="
          
          sleep 10
          screen -S mc -X stuff "op MustafaX$(printf '\r')"
          sleep 3
          screen -S mc -X stuff "op muhammad12000$(printf '\r')"
          sleep 3
          screen -S mc -X stuff "op AbbasMaster$(printf '\r')"
          sleep 3
          
          echo "  MustafaX = Admin ✅"
          echo "  muhammad12000 = Admin ✅"
          echo "  AbbasMaster = Admin ✅"
          echo "  Address: economic-acts.gl.joinmc.link"

      - name: Keep alive and save world every 5 minutes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SAVE_COUNT=0
          
          while screen -list | grep -q mc; do
            sleep 300
            
            echo "Auto-saving world... (Save #$SAVE_COUNT)"
            screen -S mc -X stuff "save-all$(printf '\r')"
            sleep 10
            
            echo "Pushing world to GitHub..."
            mkdir -p world_save
            
            cp -r world world_save/ 2>/dev/null || true
            cp -r world_nether world_save/ 2>/dev/null || true
            cp -r world_the_end world_save/ 2>/dev/null || true
            cp ops.json world_save/ 2>/dev/null || true
            cp banned-players.json world_save/ 2>/dev/null || true
            cp banned-ips.json world_save/ 2>/dev/null || true
            cp whitelist.json world_save/ 2>/dev/null || true
            
            cd world_save
            git add -A
            git diff --cached --quiet || git commit -m "Auto save - $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main 2>/dev/null || true
            cd ..
            
            SAVE_COUNT=$((SAVE_COUNT + 1))
            echo "World saved and pushed! (Save #$SAVE_COUNT)"
          done
          
          echo "Server stopped. Doing final save..."

      - name: Final world save before shutdown
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Doing final save..."
          screen -S mc -X stuff "save-all$(printf '\r')" 2>/dev/null || true
          sleep 15
          
          mkdir -p world_save
          cp -r world world_save/ 2>/dev/null || true
          cp -r world_nether world_save/ 2>/dev/null || true
          cp -r world_the_end world_save/ 2>/dev/null || true
          cp ops.json world_save/ 2>/dev/null || true
          cp banned-players.json world_save/ 2>/dev/null || true
          cp banned-ips.json world_save/ 2>/dev/null || true
          cp whitelist.json world_save/ 2>/dev/null || true
          
          cd world_save
          git add -A
          git diff --cached --quiet || git commit -m "Final save - $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main 2>/dev/null || true
          cd ..
          
          echo "Final save completed!"
