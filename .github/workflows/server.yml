name: Minecraft Server

on:
  workflow_dispatch:

concurrency:
  group: minecraft-server
  cancel-in-progress: true

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Restore world from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            world
            world_nether
            world_the_end
            banned-players.json
            banned-ips.json
            ops.json
            whitelist.json
          key: mc-world-save-main
          restore-keys: |
            mc-world-save-main
            mc-world-save-

      - name: Check restored world
        run: |
          if [ -d "world" ]; then
            echo "World restored successfully!"
          else
            echo "No world found. Starting fresh."
          fi

      - name: Download and install Forge
        run: |
          echo "Downloading Forge 1.19.2-43.3.5..."
          wget -q https://maven.minecraftforge.net/net/minecraftforge/forge/1.19.2-43.3.5/forge-1.19.2-43.3.5-installer.jar
          echo "Installing Forge server..."
          java -jar forge-1.19.2-43.3.5-installer.jar --installServer
          rm forge-1.19.2-43.3.5-installer.jar
          rm forge-1.19.2-43.3.5-installer.jar.log 2>/dev/null || true
          echo "eula=true" > eula.txt
          echo "Forge installed!"

      - name: Configure server
        run: |
          cat > server.properties << 'PROPS'
          server-port=25565
          gamemode=survival
          difficulty=normal
          max-players=5
          view-distance=6
          simulation-distance=4
          allow-flight=true
          pvp=false
          motd=SynthoPulse Server
          online-mode=false
          spawn-protection=0
          enable-command-block=true
          op-permission-level=4
          function-permission-level=4
          PROPS

      - name: Install and connect Playit
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          echo "Downloading Playit..."
          curl -L -o playit https://github.com/playit-cloud/playit-agent/releases/download/v0.15.26/playit-linux-amd64
          chmod +x playit
          cat > playit.toml << EOF
          secret_key = "$PLAYIT_SECRET"
          EOF
          PLAYIT_SECRET_KEY="$PLAYIT_SECRET" ./playit > playit.log 2>&1 &
          sleep 30
          echo "Playit Status:"
          cat playit.log | tail -5

      - name: Start server and auto-shutdown when empty
        run: |
          echo "Starting Minecraft Server..."
          
          java -Xmx4G -Xms4G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dlog4j2.formatMsgNoLookups=true \
            @libraries/net/minecraftforge/forge/1.19.2-43.3.5/unix_args.txt nogui > server_output.log 2>&1 &
          
          MC_PID=$!
          echo "Server PID: $MC_PID"
          echo "Waiting for server to start..."
          
          TIMEOUT=600
          ELAPSED=0
          while ! grep -q "Done" server_output.log 2>/dev/null; do
            sleep 10
            ELAPSED=$((ELAPSED + 10))
            echo "Loading mods... ($ELAPSED seconds)"
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Server took too long!"
              cat server_output.log 2>/dev/null | tail -50
              kill $MC_PID 2>/dev/null
              exit 1
            fi
          done
          
          echo "========================================="
          echo "  SERVER IS RUNNING!"
          echo "  Address: economic-acts.gl.joinmc.link"
          echo "========================================="
          
          sleep 5
          
          echo "op MustafaX" >> /proc/$MC_PID/fd/0 2>/dev/null || true
          sleep 2
          echo "op muhammad12000" >> /proc/$MC_PID/fd/0 2>/dev/null || true
          sleep 2
          echo "op AbbasMaster" >> /proc/$MC_PID/fd/0 2>/dev/null || true
          sleep 2
          
          echo "Admins set! Monitoring players..."
          
          EMPTY_TIME=0
          SAVE_TIMER=0
          
          while kill -0 $MC_PID 2>/dev/null; do
            sleep 60
            SAVE_TIMER=$((SAVE_TIMER + 60))
            
            PLAYER_COUNT=$(grep -c "joined the game" server_output.log 2>/dev/null || echo "0")
            LEFT_COUNT=$(grep -c "left the game" server_output.log 2>/dev/null || echo "0")
            ONLINE=$((PLAYER_COUNT - LEFT_COUNT))
            
            if [ $ONLINE -lt 0 ]; then
              ONLINE=0
            fi
            
            echo "Players online: $ONLINE"
            
            if [ $SAVE_TIMER -ge 300 ]; then
              echo "Auto-saving world..."
              echo "save-all" >> /proc/$MC_PID/fd/0 2>/dev/null || true
              SAVE_TIMER=0
              echo "World saved at $(date)"
            fi
            
            if [ $ONLINE -eq 0 ]; then
              EMPTY_TIME=$((EMPTY_TIME + 60))
              echo "Server empty for ${EMPTY_TIME} seconds..."
              
              if [ $EMPTY_TIME -ge 600 ]; then
                echo "========================================="
                echo "  No players for 10 minutes!"
                echo "  Saving and stopping server..."
                echo "========================================="
                
                echo "save-all" >> /proc/$MC_PID/fd/0 2>/dev/null || true
                sleep 10
                echo "stop" >> /proc/$MC_PID/fd/0 2>/dev/null || true
                sleep 30
                kill $MC_PID 2>/dev/null || true
                echo "Server stopped safely!"
                break
              fi
            else
              EMPTY_TIME=0
            fi
          done
          
          echo "Server has stopped. Proceeding to save world..."

      - name: Save world to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            world
            world_nether
            world_the_end
            banned-players.json
            banned-ips.json
            ops.json
            whitelist.json
          key: mc-world-save-main
