name: Minecraft Server

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: minecraft-server
  cancel-in-progress: true

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install screen
        run: sudo apt-get install -y screen

      - name: Restore world from cache
        uses: actions/cache/restore@v4
        with:
          path: |
            world
            world_nether
            world_the_end
            banned-players.json
            banned-ips.json
            ops.json
            whitelist.json
          key: mc-world-save
          restore-keys: |
            mc-world-

      - name: Download and install Forge
        run: |
          echo "Downloading Forge 1.19.2-43.3.5..."
          wget -q https://maven.minecraftforge.net/net/minecraftforge/forge/1.19.2-43.3.5/forge-1.19.2-43.3.5-installer.jar
          echo "Installing Forge server..."
          java -jar forge-1.19.2-43.3.5-installer.jar --installServer
          rm forge-1.19.2-43.3.5-installer.jar
          rm forge-1.19.2-43.3.5-installer.jar.log 2>/dev/null || true
          echo "eula=true" > eula.txt
          echo "Forge installed!"

      - name: Configure server
        run: |
          cat > server.properties << 'PROPS'
          server-port=25565
          gamemode=survival
          difficulty=hard
          max-players=5
          view-distance=5
          simulation-distance=4
          allow-flight=true
          pvp=false
          motd=SynthoPulse Server
          online-mode=false
          spawn-protection=0
          enable-command-block=true
          op-permission-level=4
          function-permission-level=4
          PROPS

      - name: Install and connect Playit automatically
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          echo "Downloading Playit..."
          curl -L -o playit https://github.com/playit-cloud/playit-agent/releases/download/v0.15.26/playit-linux-amd64
          chmod +x playit
          
          cat > playit.toml << EOF
          secret_key = "$PLAYIT_SECRET"
          EOF
          
          echo "Starting Playit..."
          PLAYIT_SECRET_KEY="$PLAYIT_SECRET" ./playit > playit.log 2>&1 &
          
          sleep 30
          
          echo "========================================="
          echo "  Playit Status:"
          cat playit.log | tail -10
          echo "========================================="

      - name: Start Minecraft Server
        run: |
          echo "========================================="
          echo "  Starting Minecraft Server..."
          echo "  Forge 1.19.2-43.3.5 | RAM: 4GB"
          echo "========================================="

          screen -dmS mc java -Xmx4G -Xms4G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dlog4j2.formatMsgNoLookups=true \
            @libraries/net/minecraftforge/forge/1.19.2-43.3.5/unix_args.txt nogui
          
          echo "Waiting for server to start..."

          TIMEOUT=600
          ELAPSED=0
          while ! grep -q "Done" logs/latest.log 2>/dev/null; do
            sleep 10
            ELAPSED=$((ELAPSED + 10))
            echo "Loading mods... ($ELAPSED seconds)"
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Server took too long!"
              cat logs/latest.log 2>/dev/null | tail -50
              exit 1
            fi
          done

          echo "========================================="
          echo "  SERVER IS RUNNING!"
          echo "  Setting up admins..."
          echo "========================================="
          
          sleep 10
          
          screen -S mc -X stuff "op MustafaX$(printf '\r')"
          sleep 3
          screen -S mc -X stuff "op muhammad12000$(printf '\r')"
          sleep 3
          screen -S mc -X stuff "op AbbasMaster$(printf '\r')"
          sleep 3
          
          echo "========================================="
          echo "  ADMINS SET!"
          echo "  MustafaX = Admin"
          echo "  muhammad12000 = Admin"
          echo "  AbbasMaster = Admin"
          echo ""
          echo "  Server address:"
          echo "  economic-acts.gl.joinmc.link"
          echo "========================================="

      - name: Keep server running and auto-save
        run: |
          echo "Server is running. Auto-saving every 5 minutes..."
          
          while screen -list | grep -q mc; do
            sleep 300
            echo "Saving world..."
            screen -S mc -X stuff "save-all$(printf '\r')"
            sleep 5
            echo "World saved at $(date)"
          done
          
          echo "Server stopped."

      - name: Save world
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            world
            world_nether
            world_the_end
            banned-players.json
            banned-ips.json
            ops.json
            whitelist.json
          key: mc-world-save-${{ github.run_number }}
